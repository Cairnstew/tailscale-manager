name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      tests: ${{ steps.filter.outputs.tests }}
      nix: ${{ steps.filter.outputs.nix }}
      docs: ${{ steps.filter.outputs.docs }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'src/**/*.py'
            tests:
              - 'tests/**/*.py'
              - 'tests/**/*.nix'
              - 'fixtures/**'
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**/*.nix'
            docs:
              - 'docs/**/*.md'
              - 'mkdocs.yml'
            any:
              - '**/*'

  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.any == 'true'
    uses: ./.github/workflows/lint.yml
    with:
      ref: ${{ github.ref }}
      repository: ${{ github.repository }}

  test-unit:
    needs: changes
    if: needs.changes.outputs.tests == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.any == 'true'
    uses: ./.github/workflows/test-unit.yml
    with:
      ref: ${{ github.ref }}
      repository: ${{ github.repository }}

  test-integration:
    needs: changes
    if: needs.changes.outputs.tests == 'true' || needs.changes.outputs.any == 'true'
    uses: ./.github/workflows/test-integration.yml
    with:
      ref: ${{ github.ref }}
      repository: ${{ github.repository }}

  nix:
    needs: changes
    if: needs.changes.result == 'success'
    uses: ./.github/workflows/nix.yml
    with:
      ref: ${{ github.ref }}
      repository: ${{ github.repository }}

  security:
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.any == 'true'
    uses: ./.github/workflows/security.yml
    with:
      ref: ${{ github.ref }}
      repository: ${{ github.repository }}

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.any == 'true'
    uses: ./.github/workflows/docs.yml
    with:
      ref: ${{ github.ref }}
      repository: ${{ github.repository }}
